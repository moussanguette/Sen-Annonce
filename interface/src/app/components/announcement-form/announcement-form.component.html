<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-sm">
        <div class="card-header bg-white">
          <h2 class="mb-0">
            <i class="fas fa-plus-circle me-2" style="color: #ff6b35;"></i>
            Publier une annonce
          </h2>
        </div>
        <div class="card-body">
          <form (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label">Titre *</label>
              <input type="text" [(ngModel)]="annonce.titre" name="titre" class="form-control" required>
            </div>
            
            <div class="mb-3">
              <label class="form-label">Description *</label>
              <textarea [(ngModel)]="annonce.description" name="description" class="form-control" rows="4" required></textarea>
            </div>
            
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Prix (FCFA) *</label>
                <input type="number" [(ngModel)]="annonce.prix" name="prix" class="form-control" required>
              </div>
              
              <div class="col-md-6 mb-3">
                <label class="form-label">Ville *</label>
                <input type="text" [(ngModel)]="annonce.ville" name="ville" class="form-control" required>
              </div>
            </div>
            
            <div class="d-flex justify-content-between mt-4">
              <a routerLink="/annonces" class="btn btn-secondary">
                <i class="fas fa-arrow-left me-2"></i>Annuler
              </a>
              <button type="submit" class="btn btn-primary">
                <i class="fas fa-save me-2"></i>Publier
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

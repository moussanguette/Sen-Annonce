<div class="container mt-4">
  <!-- État de chargement -->
  <div *ngIf="!annonce" class="text-center py-5">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Chargement...</span>
    </div>
    <p class="mt-3 text-muted">Récupération des détails de l'annonce...</p>
  </div>

  <!-- Contenu de l'annonce -->
  <div class="row" *ngIf="annonce">
    <div class="col-md-8 mx-auto">
      <div class="card shadow-lg">
        <div class="card-header bg-white py-3">
          <div class="d-flex justify-content-between align-items-center">
            <h2 class="mb-0 h4">{{ annonce.titre }}</h2>
            <span class="badge rounded-pill px-3 py-2" [ngClass]="{
              'bg-warning text-dark': annonce.statut === 'EN_ATTENTE',
              'bg-info text-white': annonce.statut === 'APPROUVEE',
              'bg-success': annonce.statut === 'PUBLIEE',
              'bg-danger': annonce.statut === 'REJETEE'
            }">{{ annonce.statut }}</span>
          </div>
        </div>
        <div class="card-body p-4">
          <div class="mb-4">
            <h6 class="text-uppercase text-muted small fw-bold mb-2">Description</h6>
            <p class="lead" style="font-size: 1.1rem;">{{ annonce.description }}</p>
          </div>
          
          <div class="row g-4 mb-4">
            <div class="col-md-6">
              <div class="p-3 bg-light rounded-3">
                <h6 class="text-muted small fw-bold mb-1">Prix</h6>
                <h3 class="text-primary mb-0">{{ annonce.prix | number:'1.0-0' }} FCFA</h3>
              </div>
            </div>
            <div class="col-md-6">
              <div class="p-3 bg-light rounded-3">
                <h6 class="text-muted small fw-bold mb-1">Localisation</h6>
                <p class="mb-0"><i class="fas fa-map-marker-alt text-danger me-2"></i>{{ annonce.ville }}</p>
              </div>
            </div>
          </div>
          
          <hr class="my-4">
          
          <div class="d-flex justify-content-between align-items-center">
            <a routerLink="/annonces" class="btn btn-outline-secondary">
              <i class="fas fa-arrow-left me-2"></i>Retour à la liste
            </a>
            
            <div class="actions">
              <button *ngIf="annonce.statut === 'EN_ATTENTE'" 
                      (click)="soumettre(annonce.id!)" 
                      class="btn btn-primary px-4">
                <i class="fas fa-paper-plane me-2"></i>Soumettre à modération
              </button>
              
              <span *ngIf="annonce.statut === 'PUBLIEE'" class="text-success fw-bold">
                <i class="fas fa-check-circle me-1"></i> Cette annonce est en ligne
              </span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
